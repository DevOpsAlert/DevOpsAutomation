name: DevOpsAlert CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-bash:
    name: Проверка Bash скриптов
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Проверка синтаксиса Bash скриптов
        run: |
          shellcheck --severity=error backup_home.sh
          shellcheck --severity=error check_resources.sh
          shellcheck --severity=error ssh_hardening.sh
          shellcheck --severity=error update_system.sh

  check-powershell:
    name: Проверка PowerShell скриптов
    runs-on: windows-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Проверка PowerShell скриптов
        run: |
          Invoke-ScriptAnalyzer -Path create_user.ps1 -Severity Error
          Invoke-ScriptAnalyzer -Path service_check.ps1 -Severity Error

  check-ansible:
    name: Проверка Ansible плейбука
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка ansible и коллекций
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install community.general community.docker

      - name: Проверка Ansible плейбука
        run: ansible-lint playbook.yml --skip-list fqcn,yaml[truthy]

  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: [check-bash, check-powershell, check-ansible]
    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка SSH ключа
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Копирование файлов на управляющий узел
        run: |
          scp -i ~/.ssh/id_rsa inventory.ini playbook.yml ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:~/ansible-project/

      - name: Запуск Ansible плейбука
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
          "ansible-playbook -i ~/ansible-project/inventory.ini ~/ansible-project/playbook.yml"

      - name: Уведомление в Telegram об успехе
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ DevOpsAlert CI/CD: Деплой успешно выполнен! Все проверки пройдены, плейбук применён на сервере."

      - name: Уведомление в Telegram об ошибке
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ DevOpsAlert CI/CD: Ошибка деплоя! Проверь логи GitHub Actions."
